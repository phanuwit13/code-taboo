# Cloudflare Workers config — deploy ผ่าน @opennextjs/cloudflare (npm run deploy)
name = "code-taboo"
main = ".open-next/worker.js"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "taboo-db"
# รัน `npx wrangler d1 create taboo-db` แล้วนำ database_id มาใส่ที่นี่
database_id = "70da7a15-44c8-4394-9359-b2df6a581c78"
